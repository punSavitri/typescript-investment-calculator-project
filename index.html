<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- bootstrap css -->
    <link
      rel="stylesheet"
      href="./node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <!-- Linked external css file -->
    <link rel="stylesheet" href="./styles/custom.css" />
    <title>💰Investment Calculator</title>
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <h1 class="text-center display-6 text-capitalize text-primary mb-4">
        💰Investment Calculator
      </h1>
      <div class="card shadow p-3">
        <form id="investment-form" class="row g-3 text-center p-2">
          <div class="col-md-6">
            <label for="initialamount" class="form-label required">
              Initial Amount(£)
              <input
                type="number"
                min="0"
                id="initialamount"
                class="form-control"
                required
              />
            </label>
          </div>
          <div class="col-md-6">
            <label for="annualcontribution" class="form-label required"
              >Annual Contribution(£)
              <input
                type="number"
                min="0"
                id="annualcontribution"
                class="form-control"
                required
              />
            </label>
          </div>
          <div class="col-md-6">
            <label for="expectedReturn" class="form-label required"
              >Expected Return(£)
              <input
                type="number"
                step="0.01"
                min="0"
                id="expectedReturn"
                class="form-control"
                required
              />
            </label>
          </div>
          <div class="col-md-6">
            <label for="duration" class="form-label required"
              >Duration(Years)
              <input
                type="number"
                id="duration"
                min="0"
                class="form-control"
                required
              />
            </label>
          </div>
          <div class="col-12 text-center">
            <button type="submit" class="btn btn-primary">Calculate</button>
          </div>
        </form>
      </div>
      <!-- results shows dynamically generated by TypeScript -->
      <div id="results" class="mt-4"></div>
    </div>

    <!-- bootstrap js -->
    <script src="./node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Linked compiled TypeScript-->
    <script src="./dist/calculator.js"></script>
  </body>
</html>
