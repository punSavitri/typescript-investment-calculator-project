<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- bootstrap css -->
    <link
      rel="stylesheet"
      href="./node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <!-- Linked external css file -->
    <link rel="stylesheet" href="./styles/custom.css" />
    <title>💰Investment Calculator</title>
  </head>
  <body>
    <h1>💰Investment Calculator</h1>
    <form id="investment-form">
      <label for="initialamount">
        Initial Amount(£)
        <input type="number" min="0" id="initialamount" required />
      </label>
      <label for="annualcontribution"
        >Annual Contribution(£)
        <input type="number" min="0" id="annualcontribution" required />
      </label>
      <label for="expectedReturn"
        >Expected expectedReturn
        <input type="number" step="0.01" min="0" id="expectedReturn" required />
      </label>
      <label for="duration"
        >Duration(Years)
        <input type="number" id="duration" min="0" required />
      </label>
      <button type="submit">Calculate</button>
    </form>
    <!-- results shows dynamically generated by TypeScript -->
    <div id="results"></div>
    <!-- bootstrap js -->
    <script src="./node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Linked compiled TypeScript-->
    <script src="./dist/calculator.js"></script>
  </body>
</html>
